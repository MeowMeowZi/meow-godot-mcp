name: Build GDExtension

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            arch: x86_64
            lib_suffix: ".so"
          - platform: windows
            os: windows-latest
            arch: x86_64
            lib_suffix: ".dll"
          - platform: macos
            os: macos-latest
            arch: universal
            lib_suffix: ".dylib"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup SCons
        run: pip install scons

      - name: Build GDExtension (template_release)
        run: scons platform=${{ matrix.platform }} target=template_release arch=${{ matrix.arch }} api_version=4.3 -j4

      - name: Build GDExtension (template_debug)
        run: scons platform=${{ matrix.platform }} target=template_debug arch=${{ matrix.arch }} api_version=4.3 -j4

      - name: Build Bridge
        run: scons bridge -j4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: meow-godot-mcp-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            project/addons/meow_godot_mcp/bin/*
            project/addons/meow_godot_mcp/companion/*
            project/addons/meow_godot_mcp/*.cfg
            project/addons/meow_godot_mcp/*.gd
            project/addons/meow_godot_mcp/*.gdextension

  # Run unit tests on the build host (Linux only since GoogleTest CI is simplest there)
  test:
    runs-on: ubuntu-22.04
    name: Unit Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Build and Run Tests
        run: |
          cd tests
          mkdir -p build && cd build
          cmake ..
          cmake --build .
          ctest --output-on-failure

  # Create release with all platform artifacts
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test]
    runs-on: ubuntu-22.04
    name: Create Release
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Checkout (for release notes)
        uses: actions/checkout@v4

      - name: Package release
        run: |
          mkdir -p release/addons/meow_godot_mcp/bin
          mkdir -p release/addons/meow_godot_mcp/companion
          # Merge all platform artifacts into single addons directory
          for dir in artifacts/meow-godot-mcp-*/; do
            # Copy bin/ contents (binaries from each platform)
            cp -f "$dir"/project/addons/meow_godot_mcp/bin/* release/addons/meow_godot_mcp/bin/ 2>/dev/null || true
            # Copy companion/ (same across platforms, just need one)
            cp -f "$dir"/project/addons/meow_godot_mcp/companion/* release/addons/meow_godot_mcp/companion/ 2>/dev/null || true
            # Copy metadata files (same across platforms)
            cp -f "$dir"/project/addons/meow_godot_mcp/*.cfg release/addons/meow_godot_mcp/ 2>/dev/null || true
            cp -f "$dir"/project/addons/meow_godot_mcp/*.gd release/addons/meow_godot_mcp/ 2>/dev/null || true
            cp -f "$dir"/project/addons/meow_godot_mcp/*.gdextension release/addons/meow_godot_mcp/ 2>/dev/null || true
          done
          # Remove .exp and .lib files (not needed for distribution)
          rm -f release/addons/meow_godot_mcp/bin/*.exp release/addons/meow_godot_mcp/bin/*.lib
          # List package contents
          echo "=== Package contents ==="
          find release/ -type f | sort
          # Create zip
          cd release
          zip -r ../meow-godot-mcp-${GITHUB_REF_NAME}.zip addons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: meow-godot-mcp-*.zip
          body_path: .github/RELEASE_NOTES.md
          make_latest: true
